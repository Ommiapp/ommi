<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ommi Learning Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0; background-color: #f9f9f9;">

<div style="width: 100%; padding: 60px 0; box-sizing: border-box; display: flex; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <div style="width: 100%; max-width: 1200px; padding: 0 24px; box-sizing: border-box; color: #111;">
    
    <p style="text-transform: uppercase; font-size: 11px; letter-spacing: 2px; color: #888; font-weight: 700; margin: 0 0 12px 0;">YOUR PERSONALIZED ROADMAP</p>
    <h1 style="font-family: 'Playfair Display', Georgia, serif; font-size: 42px; font-weight: 800; margin: 0 0 16px 0; letter-spacing: -1px;">Learning Workspace</h1>
    <p style="font-size: 16px; color: #666; margin: 0 0 40px 0; font-weight: 400; max-width: 600px; line-height: 1.5;">
      Select a timeline block below to view your structured sprint goals and track your completions. Tracked Track: <span id="user-archetype" style="font-weight: 600; color: #111;">Loading Track...</span>
    </p>
    
    <div style="display: flex; gap: 8px; border-bottom: 1px solid #eaeaea; padding-bottom: 16px; margin-bottom: 40px; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch;">
      <button class="week-tab" id="tab_weeks_1_2" onclick="switchTimelineTab('weeks_1_2')" style="background: #111111; color: #ffffff; border: none; padding: 8px 16px; font-size: 13px; font-weight: 600; border-radius: 20px; cursor: pointer;">Weeks 1–2</button>
      <button class="week-tab" id="tab_weeks_3_4" onclick="switchTimelineTab('weeks_3_4')" style="background: transparent; color: #666666; border: none; padding: 8px 16px; font-size: 13px; font-weight: 600; border-radius: 20px; cursor: pointer;">Weeks 3–4</button>
      <button class="week-tab" id="tab_weeks_5_6" onclick="switchTimelineTab('weeks_5_6')" style="background: transparent; color: #666666; border: none; padding: 8px 16px; font-size: 13px; font-weight: 600; border-radius: 20px; cursor: pointer;">Weeks 5–6</button>
      <button class="week-tab" id="tab_weeks_7_8" onclick="switchTimelineTab('weeks_7_8')" style="background: transparent; color: #666666; border: none; padding: 8px 16px; font-size: 13px; font-weight: 600; border-radius: 20px; cursor: pointer;">Weeks 7–8</button>
      <button class="week-tab" id="tab_weeks_9_10" onclick="switchTimelineTab('weeks_9_10')" style="background: transparent; color: #666666; border: none; padding: 8px 16px; font-size: 13px; font-weight: 600; border-radius: 20px; cursor: pointer;">Weeks 9–10</button>
      <button class="week-tab" id="tab_weeks_11_12" onclick="switchTimelineTab('weeks_11_12')" style="background: transparent; color: #666666; border: none; padding: 8px 16px; font-size: 13px; font-weight: 600; border-radius: 20px; cursor: pointer;">Weeks 11–12</button>
    </div>
    
    <div id="ommi-mvp-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; width: 100%;">
    </div>

  </div>
</div>

<script>
let dynamicRoadmap = {
  weeks_1_2: [], weeks_3_4: [], weeks_5_6: [], weeks_7_8: [], weeks_9_10: [], weeks_11_12: []
};
let activeTab = 'weeks_1_2';
let userProgressLog = JSON.parse(localStorage.getItem('ommi_progress_tracker_v2')) || {};

// 1. Fetch with Caching to prevent 429 errors
async function fetchLiveRoadmap() {
  const cachedRoadmap = localStorage.getItem('ommi_cached_roadmap');

  if (cachedRoadmap) {
    console.log("CACHE: Using saved roadmap data...");
    dynamicRoadmap = JSON.parse(cachedRoadmap);
    renderMvpDashboard();
    return;
  }

  console.log("FETCH: Attempting to connect to Vercel API...");
  try {
    const response = await fetch("/api/roadmap", {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: "get_roadmap" })
    });

    const data = await response.json();
    console.log("FETCH: Received data:", data);

    if (data && data.roadmap) {
      dynamicRoadmap = data.roadmap;
      localStorage.setItem('ommi_cached_roadmap', JSON.stringify(data.roadmap));
      document.getElementById('user-archetype').innerText = data.careerGoal || "Digital Creator";
      renderMvpDashboard();
    } else {
      console.warn("FETCH: Data received but no roadmap found.");
    }
  } catch (err) {
    console.error("FETCH: Critical error:", err);
  }
}

// 2. The Renderer function
function renderMvpDashboard() {
  console.log("RENDER: Starting render for tab:", activeTab);
  let htmlBlock = '';
  const currentCourses = dynamicRoadmap[activeTab] || [];
  
  if (currentCourses.length === 0) {
    htmlBlock = `<p style="color: #666; padding: 40px 0;">No roadmap data loaded yet.</p>`;
  } else {
    currentCourses.forEach(course => {
      const isCompleted = userProgressLog[course.id] === true;
      htmlBlock += `
        <div style="background: #ffffff; border-radius: 12px; border: 1px solid ${isCompleted ? '#111111' : '#eaeaea'}; padding: 24px;">
          <h3 style="font-size: 16px; margin: 10px 0;">${course.title}</h3>
          <a href="${course.link}" target="_blank" style="display:block; margin-bottom: 20px; color: #111;">Launch Resource ↗</a>
          <button onclick="toggleCourseMilestone('${course.id}')" style="width: 100%; padding: 10px; cursor: pointer; border-radius: 6px; border: 1px solid #111; background: ${isCompleted ? '#111' : '#fff'}; color: ${isCompleted ? '#fff' : '#111'}">
            ${isCompleted ? 'Completed' : 'Mark as Complete'}
          </button>
        </div>
      `;
    });
  }
  document.getElementById('ommi-mvp-grid').innerHTML = htmlBlock;
}

// 3. Tab switching
window.switchTimelineTab = function(tabId) {
  activeTab = tabId;
  // Update UI for buttons
  document.querySelectorAll('.week-tab').forEach(btn => {
    btn.style.background = 'transparent';
    btn.style.color = '#666666';
  });
  document.getElementById(`tab_${tabId}`).style.background = '#111111';
  document.getElementById(`tab_${tabId}`).style.color = '#ffffff';
  renderMvpDashboard();
}

window.toggleCourseMilestone = function(courseId) {
  userProgressLog[courseId] = !userProgressLog[courseId];
  localStorage.setItem('ommi_progress_tracker_v2', JSON.stringify(userProgressLog));
  renderMvpDashboard();
}

// 4. Trigger on load
document.addEventListener("DOMContentLoaded", () => {
  renderMvpDashboard();
  fetchLiveRoadmap();
});
</script>
</body>
</html>
